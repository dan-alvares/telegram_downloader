[project]
name = "telegram-video-downloader"
version = "0.1.0"
description = "CLI para facilitar o download de vídeos em grupos/canais do Telegram"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "asyncio>=4.0.0",
    "python-dotenv>=1.2.2",
    "telethon>=1.42.0",
    "toml>=0.10.2",
    "tqdm>=4.67.3",
    "typer>=0.24.1",
]

[dependency-groups]
dev = [
    "nuitka>=4.0.5",
    "zstandard>=0.25.0",
]
