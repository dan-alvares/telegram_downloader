name: Build Windows Executable

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version bump
        id: version
        shell: pwsh
        run: |
          $current = (Get-Content pyproject.toml | Select-String 'version = "(.+)"').Matches.Groups[1].Value

          git show HEAD~1:pyproject.toml | Out-File -Encoding utf8 prev_pyproject.toml
          $previous = (Get-Content prev_pyproject.toml | Select-String 'version = "(.+)"').Matches.Groups[1].Value

          Write-Host "Current version: $current"
          Write-Host "Previous version: $previous"

          if ($current -eq $previous) {
            Write-Host "Version unchanged. Skipping build."
            echo "VERSION_CHANGED=false" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Version changed: $previous -> $current"
            echo "VERSION_CHANGED=true" >> $env:GITHUB_OUTPUT
            echo "VERSION=$current" >> $env:GITHUB_OUTPUT
          }

      - name: Set up Python
        if: steps.version.outputs.VERSION_CHANGED == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        if: steps.version.outputs.VERSION_CHANGED == 'true'
        run: pip install uv

      - name: Install dependencies
        if: steps.version.outputs.VERSION_CHANGED == 'true'
        run: |
          uv sync --no-dev
          uv pip install nuitka zstandard

      - name: Build with Nuitka
        if: steps.version.outputs.VERSION_CHANGED == 'true'
        run: |
          uv run python -m nuitka `
            --standalone `
            --assume-yes-for-downloads `
            --include-package=telethon `
            --include-package=asyncio `
            --include-package=dotenv `
            --include-package=typer `
            --include-package=rich `
            --include-package=qrcode `
            --output-filename=downloader.exe `
            --output-dir=dist `
            --remove-output `
            cli.py

      - name: Prepare release folder
        if: steps.version.outputs.VERSION_CHANGED == 'true'
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"

          # Renomeia cli.dist para "Telegram Downloader"
          Rename-Item -Path "dist\cli.dist" -NewName "Telegram Downloader"

          # Cria o .env template
          @"
          TG_API_ID=
          TG_API_HASH=
          DOWNLOAD_SIM=3
          "@ | Set-Content "dist\Telegram Downloader\.env"

          # Compacta em .zip
          Compress-Archive `
            -Path "dist\Telegram Downloader" `
            -DestinationPath "telegram-downloader_v$version.zip"

      - name: Create GitHub Release
        if: steps.version.outputs.VERSION_CHANGED == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: V${{ steps.version.outputs.VERSION }} - Telegram Downloader
          body: |
            Antes de usar, lembre-se de editar o arquivo .env no bloco de notas e preencha de acordo com as instruções.
          files: telegram-downloader_v${{ steps.version.outputs.VERSION }}.zip